<style>

body {
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
    padding: 40px 16px;
    text-align: center;
    background: #f5f5f5;
}
.box {
    background: #fff;
    border-radius: 16px;
    padding: 32px 24px;
    max-width: 360px;
    margin: 0 auto;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
}
h2 { color: #333; font-size: 20px; margin-bottom: 24px; }
.row { display: flex; gap: 10px; justify-content: center; }
input {
    flex: 1; max-width: 200px; padding: 12px 14px;
    font-size: 17px; border: 1px solid #ddd; border-radius: 10px; outline: none;
}
input:focus { border-color: #07c160; }
button {
    padding: 12px 22px; font-size: 17px; border: none;
    background: #07c160; color: #fff; border-radius: 10px;
    cursor: pointer; font-weight: 600;
}
#out { margin-top: 24px; font-size: 28px; font-weight: bold; color: #333; min-height: 40px; }
#out .label { font-size: 16px; font-weight: normal; color: #999; }
#out .err { color: #ff4d4f; font-size: 18px; }
</style>
</head>

    <div class="row">

function go() {
    var k = document.getElementById('key').value.trim();
    var out = document.getElementById('out');

    if (!k) { out.innerHTML = ''; return; }

    var r = data[k];

    // 去末尾编号再查（如 灿启01 → 灿启）
    if (!r) {
        var m = k.match(/^(.+?)(\d{1,2})$/);
        if (m) r = data[m[1]];
    }

    if (r) {
        out.innerHTML = r;
    } else {
        out.innerHTML = '<span class="err">未找到该公司</span>';
    }
}

document.getElementById('key').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') go();
});
